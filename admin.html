<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · Visual Realm</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@200;300;400;500;600&display=swap"
  rel="stylesheet"
/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --p1:#08000f; --p2:#12001f; --p3:#2c0a4d; --p4:#4b0082; --p5:#6a0dad; --p6:#9b30ff;
    --g1:#ffd700; --g2:#e5b567; --g3:#c8860a;
    --w1:rgba(255,255,255,.92); --w2:rgba(232,213,255,.82); --w3:rgba(196,168,224,.65);
    --border:rgba(229,181,103,.22); --card:rgba(18,0,31,.78);
  }
  html,body{background:var(--p1);color:var(--w2);font-family:"DM Sans",sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
  body{background:
    radial-gradient(ellipse 100% 60% at 50% -10%, var(--p3), transparent 60%),
    var(--p1);
  }
  img{max-width:100%;display:block;}
  h1,h2,h3{font-family:"Cormorant Garamond",serif;font-weight:400;color:var(--g1);letter-spacing:.02em;}
  a{color:var(--g2);}
  button,input,select,textarea{font-family:inherit;font-size:13px;color:var(--w1);}
  input,select,textarea{
    background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:6px;
    padding:.6rem .8rem; width:100%; outline:none; transition:border-color .2s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--g3);}
  textarea{resize:vertical;min-height:70px;}
  label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--w3);margin-bottom:.35rem;}
  .field{margin-bottom:1rem;}
  .row{display:flex;gap:1rem;flex-wrap:wrap;}
  .row > .field{flex:1;min-width:160px;}
  button{
    cursor:pointer; background:linear-gradient(135deg,var(--g3),var(--g1));
    color:#1a0a00; border:none; border-radius:6px; padding:.65rem 1.3rem;
    font-weight:600; letter-spacing:.03em; transition:transform .15s, opacity .15s;
  }
  button:hover{transform:translateY(-1px);}
  button:disabled{opacity:.5;cursor:default;transform:none;}
  button.ghost{
    background:transparent; color:var(--g2); border:1px solid var(--border); font-weight:400;
  }
  button.danger{background:linear-gradient(135deg,#7a1a1a,#c0392b);color:#fff;}
  button.small{padding:.4rem .8rem;font-size:12px;}

  /* ── LOGIN SCREEN ── */
  #login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem;
  }
  .login-box{
    width:100%; max-width:360px; background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:2.4rem 2rem; text-align:center; backdrop-filter:blur(10px);
  }
  .login-box h1{font-size:28px;margin-bottom:.3rem;}
  .login-box p{color:var(--w3);font-size:12px;margin-bottom:1.6rem;}
  .login-box .field{text-align:left;}
  #login-err{color:#ff8a8a;font-size:12px;margin-top:.8rem;display:none;}

  /* ── DASHBOARD SHELL ── */
  #dash{display:none;min-height:100vh;}
  #dash.show{display:block;}
  header.top{
    position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
    padding:1rem 1.6rem; background:rgba(8,0,15,.85); backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  header.top h1{font-size:20px;}
  header.top .who{font-size:11px;color:var(--w3);}
  nav.tabs{
    display:flex; gap:.4rem; padding:1rem 1.6rem 0; flex-wrap:wrap; max-width:1100px; margin:0 auto;
  }
  nav.tabs button{
    background:transparent; color:var(--w3); border:1px solid var(--border); font-weight:400;
    padding:.55rem 1.1rem; border-radius:8px 8px 0 0;
  }
  nav.tabs button.active{color:var(--g1); border-color:var(--g3); background:var(--card);}
  main{max-width:1100px;margin:0 auto;padding:1.6rem;}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:1.5rem; margin-bottom:1.4rem;
  }
  .card h2{font-size:20px;margin-bottom:1rem;}
  .hint{font-size:11.5px;color:var(--w3);margin-top:.4rem;}
  .msg{font-size:12px;margin-top:.6rem;display:none;padding:.5rem .8rem;border-radius:6px;}
  .msg.ok{display:block;background:rgba(120,255,150,.1);color:#8effa3;}
  .msg.err{display:block;background:rgba(255,100,100,.1);color:#ff8a8a;}

  /* profile */
  .profile-photo-row{display:flex;gap:1.4rem;align-items:center;flex-wrap:wrap;}
  .photo-preview{
    width:110px;height:110px;border-radius:50%;object-fit:cover;border:2px solid var(--g3);
    background:var(--p3);
  }

  /* content lists (portfolio / reel) */
  .item-list{display:flex;flex-direction:column;gap:.6rem;margin-top:1rem;}
  .item-row{
    display:flex; align-items:center; gap:.9rem; background:rgba(255,255,255,.03);
    border:1px solid var(--border); border-radius:8px; padding:.6rem .8rem; cursor:grab;
  }
  .item-row.dragging{opacity:.4;}
  .item-row .thumb{
    width:56px;height:56px;flex-shrink:0;border-radius:6px;object-fit:cover;background:var(--p3);
  }
  .item-row .grip{color:var(--w3);font-size:16px;line-height:1;user-select:none;}
  .item-row .meta{flex:1;min-width:0;}
  .item-row .meta .t{color:var(--w1);font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-row .meta .s{color:var(--w3);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .item-row .tag{
    font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--g2);
    border:1px solid var(--border);padding:.2rem .5rem;border-radius:4px;flex-shrink:0;
  }
  .item-row .actions{display:flex;gap:.4rem;flex-shrink:0;}
  .empty-note{color:var(--w3);font-size:12.5px;padding:.8rem 0;}

  /* reviews */
  .rev-row{
    background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:8px;
    padding:.8rem 1rem; margin-bottom:.6rem;
  }
  .rev-row .stars{color:var(--g1);font-size:12px;margin-bottom:.3rem;}
  .rev-row .msgtxt{color:var(--w1);font-size:13px;margin-bottom:.4rem;}
  .rev-row .auth{display:flex;justify-content:space-between;align-items:center;color:var(--w3);font-size:11.5px;}

  .spinner{
    display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
    border-top-color:#1a0a00;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--p4);border-radius:4px;}
</style>
</head>
<body>

  <!-- ══════ LOGIN ══════ -->
  <div id="login-screen">
    <div class="login-box">
      <h1>Visual Realm</h1>
      <p>Admin sign in</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="li-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="li-pass" placeholder="••••••••" />
      </div>
      <button id="li-btn" style="width:100%">Sign in</button>
      <div id="login-err"></div>
    </div>
  </div>

  <!-- ══════ DASHBOARD ══════ -->
  <div id="dash">
    <header class="top">
      <h1>Visual Realm · Admin</h1>
      <div style="display:flex;align-items:center;gap:1rem;">
        <span class="who" id="who-email"></span>
        <button class="ghost small" id="signout-btn">Sign out</button>
      </div>
    </header>

    <nav class="tabs">
      <button data-tab="profile" class="active">Profile</button>
      <button data-tab="portfolio">Portfolio</button>
      <button data-tab="reel">Reel</button>
      <button data-tab="reviews">Reviews</button>
      <button data-tab="account">Account</button>
    </nav>

    <main>
      <!-- PROFILE -->
      <section class="panel active" id="panel-profile">
        <div class="card">
          <h2>Profile photo</h2>
          <div class="profile-photo-row">
            <img class="photo-preview" id="profile-photo-preview" src="" alt="" />
            <div style="flex:1;min-width:200px;">
              <div class="field">
                <label>Upload new photo</label>
                <input type="file" id="profile-photo-input" accept="image/*" />
              </div>
              <button id="profile-photo-save">Update photo</button>
              <div class="msg" id="profile-photo-msg"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>About section</h2>
          <div class="row">
            <div class="field"><label>Name</label><input id="ab-name" /></div>
            <div class="field"><label>Tagline</label><input id="ab-tag" /></div>
          </div>
          <div class="row">
            <div class="field"><label>Location</label><input id="ab-loc" /></div>
            <div class="field"><label>Years of experience</label><input id="ab-years" type="number" /></div>
          </div>
          <div class="field"><label>Bio</label><textarea id="ab-bio"></textarea></div>
          <button id="ab-save">Save about section</button>
          <div class="msg" id="ab-msg"></div>
        </div>
      </section>

      <!-- PORTFOLIO -->
      <section class="panel" id="panel-portfolio">
        <div class="card">
          <h2>Add portfolio piece</h2>
          <div class="row">
            <div class="field"><label>Title</label><input id="pf-title" placeholder="Celestial Empress" /></div>
            <div class="field"><label>Subtitle</label><input id="pf-sub" placeholder="Fashion Editorial · 2026" /></div>
          </div>
          <div class="row">
            <div class="field">
              <label>Category</label>
              <select id="pf-cat">
                <option value="photo">Photo</option>
                <option value="video">Video</option>
                <option value="content">Content</option>
                <option value="film">Film</option>
              </select>
            </div>
            <div class="field">
              <label>Card size</label>
              <select id="pf-size">
                <option value="normal">Normal</option>
                <option value="wide">Wide</option>
                <option value="tall">Tall</option>
              </select>
            </div>
            <div class="field"><label>Badge text</label><input id="pf-badge" placeholder="Fashion" /></div>
          </div>
          <div class="row">
            <div class="field"><label>Cover image</label><input type="file" id="pf-image" accept="image/*" /></div>
            <div class="field"><label>Video file (optional, for video/film pieces)</label><input type="file" id="pf-video" accept="video/*" /></div>
          </div>
          <button id="pf-add">Add to gallery</button>
          <div class="msg" id="pf-add-msg"></div>
        </div>

        <div class="card">
          <h2>Gallery items <span class="hint" style="text-transform:none;letter-spacing:0;">drag to reorder</span></h2>
          <div class="item-list" id="pf-list"><div class="empty-note">Loading…</div></div>
        </div>
      </section>

      <!-- REEL -->
      <section class="panel" id="panel-reel">
        <div class="card">
          <h2>Add reel clip</h2>
          <div class="field"><label>Label</label><input id="rl-label" placeholder="Fashion Cut" /></div>
          <div class="row">
            <div class="field"><label>Video file</label><input type="file" id="rl-video" accept="video/*" /></div>
            <div class="field"><label>Thumbnail (optional)</label><input type="file" id="rl-thumb" accept="image/*" /></div>
          </div>
          <button id="rl-add">Add to reel</button>
          <div class="msg" id="rl-add-msg"></div>
        </div>

        <div class="card">
          <h2>Reel clips <span class="hint" style="text-transform:none;letter-spacing:0;">drag to reorder</span></h2>
          <div class="item-list" id="rl-list"><div class="empty-note">Loading…</div></div>
        </div>
      </section>

      <!-- REVIEWS -->
      <section class="panel" id="panel-reviews">
        <div class="card">
          <h2>Client reviews</h2>
          <div id="rev-list"><div class="empty-note">Loading…</div></div>
        </div>
      </section>

      <!-- ACCOUNT -->
      <section class="panel" id="panel-account">
        <div class="card" style="max-width:420px;">
          <h2>Change password</h2>
          <div class="field"><label>Current password</label><input type="password" id="pw-current" /></div>
          <div class="field"><label>New password</label><input type="password" id="pw-new" /></div>
          <div class="field"><label>Confirm new password</label><input type="password" id="pw-confirm" /></div>
          <button id="pw-save">Update password</button>
          <div class="msg" id="pw-msg"></div>
        </div>
      </section>
    </main>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDFIhhbiVT3EBDZPLze1S9AaAvT34-llSY",
    authDomain: "portfolio-50908.firebaseapp.com",
    projectId: "portfolio-50908",
    storageBucket: "portfolio-50908.firebasestorage.app",
    messagingSenderId: "441613453929",
    appId: "1:441613453929:web:5efa666d182f82fb6a70f8",
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* ── Cloudinary (free tier, no billing needed) ──
     Files upload here instead of Firebase Storage (which now requires
     the paid Blaze plan). Firestore still stores the resulting URL. */
  const CLOUDINARY_CLOUD_NAME = "zvzefaki";
  const CLOUDINARY_UPLOAD_PRESET = "Portfolio-asset";

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  function showMsg(el, text, ok) {
    el.textContent = text;
    el.className = "msg " + (ok ? "ok" : "err");
  }

  /* resourceType: "image" or "video" */
  function uploadFile(resourceType, file) {
    const url = "https://api.cloudinary.com/v1_1/" + CLOUDINARY_CLOUD_NAME + "/" + resourceType + "/upload";
    const form = new FormData();
    form.append("file", file);
    form.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    return fetch(url, { method: "POST", body: form })
      .then((res) => {
        if (!res.ok) return res.json().then((j) => { throw new Error(j.error?.message || "Upload failed"); });
        return res.json();
      })
      .then((data) => data.secure_url);
  }

  /* ── AUTH GATE ── */
  auth.onAuthStateChanged((user) => {
    if (user) {
      $("#login-screen").style.display = "none";
      $("#dash").classList.add("show");
      $("#who-email").textContent = user.email;
      initDashboardData();
    } else {
      $("#login-screen").style.display = "flex";
      $("#dash").classList.remove("show");
    }
  });

  $("#li-btn").addEventListener("click", () => {
    const email = $("#li-email").value.trim();
    const pass = $("#li-pass").value;
    const errBox = $("#login-err");
    errBox.style.display = "none";
    if (!email || !pass) return;
    $("#li-btn").disabled = true;
    $("#li-btn").textContent = "Signing in…";
    auth.signInWithEmailAndPassword(email, pass)
      .catch((err) => {
        errBox.textContent = "Sign-in failed, check your email and password.";
        errBox.style.display = "block";
        console.error(err);
      })
      .finally(() => {
        $("#li-btn").disabled = false;
        $("#li-btn").textContent = "Sign in";
      });
  });

  $("#signout-btn").addEventListener("click", () => auth.signOut());

  /* ── TABS ── */
  $$(".tabs button").forEach((btn) => {
    btn.addEventListener("click", () => {
      $$(".tabs button").forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      $$(".panel").forEach((p) => p.classList.remove("active"));
      $("#panel-" + btn.dataset.tab).classList.add("active");
    });
  });

  let dataInitDone = false;
  function initDashboardData() {
    if (dataInitDone) return;
    dataInitDone = true;
    loadAboutSection();
    watchPortfolio();
    watchReel();
    watchReviews();
  }

  /* ══════ PROFILE / ABOUT ══════ */
  function loadAboutSection() {
    db.collection("settings").doc("about").onSnapshot((doc) => {
      const d = doc.exists ? doc.data() : {};
      $("#profile-photo-preview").src = d.photoURL || "";
      $("#ab-name").value = d.name || "";
      $("#ab-tag").value = d.tag || "";
      $("#ab-loc").value = d.loc || "";
      $("#ab-years").value = d.years || "";
      $("#ab-bio").value = d.bio || "";
    }, (err) => console.warn("[about]", err.message));
  }

  $("#profile-photo-save").addEventListener("click", () => {
    const file = $("#profile-photo-input").files[0];
    const msg = $("#profile-photo-msg");
    if (!file) { showMsg(msg, "Choose a photo first.", false); return; }
    const btn = $("#profile-photo-save");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Uploading…';
    uploadFile("image", file)
      .then((url) => db.collection("settings").doc("about").set({ photoURL: url }, { merge: true }))
      .then(() => showMsg(msg, "Profile photo updated.", true))
      .catch((err) => { console.error(err); showMsg(msg, "Upload failed: " + err.message, false); })
      .finally(() => { btn.disabled = false; btn.textContent = "Update photo"; });
  });

  $("#ab-save").addEventListener("click", () => {
    const msg = $("#ab-msg");
    const data = {
      name: $("#ab-name").value.trim(),
      tag: $("#ab-tag").value.trim(),
      loc: $("#ab-loc").value.trim(),
      years: $("#ab-years").value.trim(),
      bio: $("#ab-bio").value.trim(),
    };
    db.collection("settings").doc("about").set(data, { merge: true })
      .then(() => showMsg(msg, "About section saved.", true))
      .catch((err) => { console.error(err); showMsg(msg, "Save failed: " + err.message, false); });
  });

  /* ══════ PORTFOLIO ══════ */
  function watchPortfolio() {
    db.collection("portfolio").orderBy("order", "asc").onSnapshot((snap) => {
      const list = $("#pf-list");
      list.innerHTML = "";
      if (snap.empty) { list.innerHTML = '<div class="empty-note">No pieces yet, add one above.</div>'; return; }
      snap.forEach((docSnap) => {
        const d = docSnap.data();
        const row = document.createElement("div");
        row.className = "item-row";
        row.draggable = true;
        row.dataset.id = docSnap.id;
        row.innerHTML =
          '<span class="grip">⠿</span>' +
          (d.imageURL ? '<img class="thumb" src="' + d.imageURL + '">' : '<div class="thumb"></div>') +
          '<div class="meta"><div class="t">' + (d.title || "Untitled") + '</div><div class="s">' + (d.subtitle || "") + '</div></div>' +
          '<span class="tag">' + (d.category || "") + '</span>' +
          '<div class="actions"><button class="ghost small" data-act="edit">Edit</button><button class="danger small" data-act="del">Delete</button></div>';
        row.querySelector('[data-act="del"]').addEventListener("click", () => {
          if (confirm('Delete "' + (d.title || "this piece") + '"? This can\'t be undone.')) {
            db.collection("portfolio").doc(docSnap.id).delete().catch((e) => alert("Delete failed: " + e.message));
          }
        });
        row.querySelector('[data-act="edit"]').addEventListener("click", () => editPortfolioItem(docSnap.id, d));
        attachDrag(row, "portfolio");
        list.appendChild(row);
      });
    }, (err) => console.warn("[portfolio]", err.message));
  }

  function editPortfolioItem(id, d) {
    const title = prompt("Title", d.title || "");
    if (title === null) return;
    const subtitle = prompt("Subtitle", d.subtitle || "");
    if (subtitle === null) return;
    const category = prompt("Category (photo / video / content / film)", d.category || "photo");
    if (category === null) return;
    db.collection("portfolio").doc(id).update({ title, subtitle, category })
      .catch((e) => alert("Update failed: " + e.message));
  }

  $("#pf-add").addEventListener("click", () => {
    const msg = $("#pf-add-msg");
    const title = $("#pf-title").value.trim();
    const subtitle = $("#pf-sub").value.trim();
    const category = $("#pf-cat").value;
    const size = $("#pf-size").value;
    const badge = $("#pf-badge").value.trim();
    const imgFile = $("#pf-image").files[0];
    const vidFile = $("#pf-video").files[0];
    if (!title || (!imgFile && !vidFile)) {
      showMsg(msg, "Give it a title and at least a cover image or video.", false);
      return;
    }
    const btn = $("#pf-add");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Uploading…';
    const docRef = db.collection("portfolio").doc();
    const uploads = [];
    if (imgFile) uploads.push(uploadFile("image", imgFile).then((u) => ({ imageURL: u })));
    if (vidFile) uploads.push(uploadFile("video", vidFile).then((u) => ({ videoURL: u })));

    db.collection("portfolio").orderBy("order", "desc").limit(1).get()
      .then((snap) => {
        const nextOrder = snap.empty ? 0 : (snap.docs[0].data().order || 0) + 1;
        return Promise.all(uploads).then((results) => {
          const merged = Object.assign({}, ...results);
          return docRef.set(Object.assign({
            title, subtitle, category, size, badge, order: nextOrder,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          }, merged));
        });
      })
      .then(() => {
        showMsg(msg, "Added to the gallery.", true);
        $("#pf-title").value = ""; $("#pf-sub").value = ""; $("#pf-badge").value = "";
        $("#pf-image").value = ""; $("#pf-video").value = "";
      })
      .catch((err) => { console.error(err); showMsg(msg, "Failed: " + err.message, false); })
      .finally(() => { btn.disabled = false; btn.textContent = "Add to gallery"; });
  });

  /* ══════ REEL ══════ */
  function watchReel() {
    db.collection("reels").orderBy("order", "asc").onSnapshot((snap) => {
      const list = $("#rl-list");
      list.innerHTML = "";
      if (snap.empty) { list.innerHTML = '<div class="empty-note">No clips yet, add one above.</div>'; return; }
      snap.forEach((docSnap) => {
        const d = docSnap.data();
        const row = document.createElement("div");
        row.className = "item-row";
        row.draggable = true;
        row.dataset.id = docSnap.id;
        row.innerHTML =
          '<span class="grip">⠿</span>' +
          (d.thumbURL ? '<img class="thumb" src="' + d.thumbURL + '">' : '<div class="thumb"></div>') +
          '<div class="meta"><div class="t">' + (d.label || "Untitled clip") + '</div></div>' +
          '<div class="actions"><button class="danger small" data-act="del">Delete</button></div>';
        row.querySelector('[data-act="del"]').addEventListener("click", () => {
          if (confirm('Delete "' + (d.label || "this clip") + '"? This can\'t be undone.')) {
            db.collection("reels").doc(docSnap.id).delete().catch((e) => alert("Delete failed: " + e.message));
          }
        });
        attachDrag(row, "reels");
        list.appendChild(row);
      });
    }, (err) => console.warn("[reels]", err.message));
  }

  $("#rl-add").addEventListener("click", () => {
    const msg = $("#rl-add-msg");
    const label = $("#rl-label").value.trim();
    const vidFile = $("#rl-video").files[0];
    const thumbFile = $("#rl-thumb").files[0];
    if (!label || !vidFile) { showMsg(msg, "Give it a label and a video file.", false); return; }
    const btn = $("#rl-add");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Uploading…';
    const docRef = db.collection("reels").doc();
    const uploads = [uploadFile("video", vidFile).then((u) => ({ videoURL: u }))];
    if (thumbFile) uploads.push(uploadFile("image", thumbFile).then((u) => ({ thumbURL: u })));

    db.collection("reels").orderBy("order", "desc").limit(1).get()
      .then((snap) => {
        const nextOrder = snap.empty ? 0 : (snap.docs[0].data().order || 0) + 1;
        return Promise.all(uploads).then((results) => {
          const merged = Object.assign({}, ...results);
          return docRef.set(Object.assign({
            label, order: nextOrder, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          }, merged));
        });
      })
      .then(() => {
        showMsg(msg, "Added to the reel.", true);
        $("#rl-label").value = ""; $("#rl-video").value = ""; $("#rl-thumb").value = "";
      })
      .catch((err) => { console.error(err); showMsg(msg, "Failed: " + err.message, false); })
      .finally(() => { btn.disabled = false; btn.textContent = "Add to reel"; });
  });

  /* ══════ DRAG TO REORDER (shared) ══════ */
  function attachDrag(row, collectionName) {
    row.addEventListener("dragstart", () => row.classList.add("dragging"));
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      persistOrder(collectionName, row.parentElement);
    });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      const list = row.parentElement;
      const dragging = list.querySelector(".dragging");
      if (!dragging || dragging === row) return;
      const rect = row.getBoundingClientRect();
      const before = e.clientY - rect.top < rect.height / 2;
      list.insertBefore(dragging, before ? row : row.nextSibling);
    });
  }
  function persistOrder(collectionName, listEl) {
    const rows = [...listEl.querySelectorAll(".item-row")];
    const batch = db.batch();
    rows.forEach((row, i) => {
      batch.update(db.collection(collectionName).doc(row.dataset.id), { order: i });
    });
    batch.commit().catch((e) => console.error("Reorder failed:", e));
  }

  /* ══════ REVIEWS ══════ */
  function watchReviews() {
    db.collection("reviews").orderBy("ts", "desc").onSnapshot((snap) => {
      const box = $("#rev-list");
      box.innerHTML = "";
      if (snap.empty) { box.innerHTML = '<div class="empty-note">No reviews yet.</div>'; return; }
      snap.forEach((docSnap) => {
        const d = docSnap.data();
        const row = document.createElement("div");
        row.className = "rev-row";
        const stars = "★".repeat(d.rating || 5) + "☆".repeat(5 - (d.rating || 5));
        const date = d.ts ? new Date(d.ts).toLocaleDateString() : "";
        row.innerHTML =
          '<div class="stars">' + stars + '</div>' +
          '<div class="msgtxt">' + (d.msg || "") + '</div>' +
          '<div class="auth"><span>' + (d.name || "Anonymous") + (d.role ? " · " + d.role : "") + " · " + date + '</span></div>';
        const actions = document.createElement("div");
        actions.style.marginTop = ".5rem";
        const delBtn = document.createElement("button");
        delBtn.className = "danger small";
        delBtn.textContent = "Delete";
        delBtn.addEventListener("click", () => {
          if (confirm("Remove this review? This can't be undone.")) {
            db.collection("reviews").doc(docSnap.id).delete().catch((e) => alert("Delete failed: " + e.message));
          }
        });
        actions.appendChild(delBtn);
        row.appendChild(actions);
        box.appendChild(row);
      });
    }, (err) => console.warn("[reviews]", err.message));
  }

  /* ══════ ACCOUNT / PASSWORD ══════ */
  $("#pw-save").addEventListener("click", () => {
    const msg = $("#pw-msg");
    const current = $("#pw-current").value;
    const next = $("#pw-new").value;
    const confirmPw = $("#pw-confirm").value;
    if (!current || !next) { showMsg(msg, "Fill in both password fields.", false); return; }
    if (next !== confirmPw) { showMsg(msg, "New passwords don't match.", false); return; }
    if (next.length < 6) { showMsg(msg, "New password should be at least 6 characters.", false); return; }
    const user = auth.currentUser;
    const btn = $("#pw-save");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Updating…';
    const cred = firebase.auth.EmailAuthProvider.credential(user.email, current);
    user.reauthenticateWithCredential(cred)
      .then(() => user.updatePassword(next))
      .then(() => {
        showMsg(msg, "Password updated.", true);
        $("#pw-current").value = ""; $("#pw-new").value = ""; $("#pw-confirm").value = "";
      })
      .catch((err) => {
        console.error(err);
        showMsg(msg, err.code === "auth/wrong-password" ? "Current password is incorrect." : "Failed: " + err.message, false);
      })
      .finally(() => { btn.disabled = false; btn.textContent = "Update password"; });
  });
</script>
